<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Submit Exam - {{ course.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="p-4">
    <div class="container">
      <h1>Submit Exam: {{ course.title }}</h1>
      <form method="post">
        {% csrf_token %}
        {% for lesson in course.lessons.all %}
          <div class="card mb-3">
            <div class="card-body">
              <h5 class="card-title">{{ lesson.title }}</h5>
              {% for question in lesson.questions.all %}
                <div class="mb-2">
                  <p><strong>{{ question.text }}</strong></p>
                  {% for choice in question.choices.all %}
                    <div class="form-check">
                      <input class="form-check-input" type="radio" name="choice_{{ question.id }}" id="choice_{{ choice.id }}" value="{{ choice.id }}">
                      <label class="form-check-label" for="choice_{{ choice.id }}">{{ choice.text }}</label>
                    </div>
                  {% endfor %}
                </div>
              {% endfor %}
            </div>
          </div>
        {% endfor %}
        <button class="btn btn-primary" type="submit">Submit Exam</button>
      </form>
    </div>
  </body>
</html>
